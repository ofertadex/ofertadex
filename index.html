<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="topbar-slogan">
      Melhores ofertas da Amazon todo dia
      <svg width="13" height="13" viewBox="0 0 24 24" fill="#f26522"><path d="M12 2C9 7 4 9 4 14a8 8 0 0 0 16 0c0-5-5-7-8-12z"/></svg>
    </span>
    <div class="topbar-social">
      <a class="ig" href="https://www.instagram.com/ofertadex" target="_blank" rel="noopener" aria-label="Instagram">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>
      <a class="fb" href="https://www.facebook.com/ofertadex1" target="_blank" rel="noopener" aria-label="Facebook">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">

<header>

      <span class="logo-name">Oferta<span>Dex</span></span>
      <span class="logo-tag">As Melhores Promos</span>
    </a>
    <div class="search-wrap">
      <input
        type="search"
        id="busca"
        placeholder="Buscar produtos..."
        autocomplete="off"
        aria-label="Buscar produtos"
      />
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner" id="filter-bar">
    <button class="pill active" data-cat="">Todos</button>
  </div>
</div>

<main>
  <div class="bar-top">
    <p class="results-info" id="results-info"></p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  OfertaDex &mdash; Links de afiliado Amazon. Os preços podem variar.
</footer>

<script src="script.js"></script>
