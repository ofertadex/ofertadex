<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertadex — Melhores Ofertas Amazon</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .header { background: #fff; border-bottom: 1px solid #eee; padding: 1.5rem 1rem 1rem; text-align: center; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 0.75rem; background: #FF6B35; display: flex; align-items: center; justify-content: center; font-size: 32px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .bio { font-size: 14px; color: #666; margin-bottom: 0.75rem; }
  .social { display: flex; gap: 12px; justify-content: center; margin-bottom: 1rem; }
  .social a { font-size: 13px; color: #FF6B35; text-decoration: none; font-weight: 500; }
  .search-wrap { max-width: 480px; margin: 0 auto; position: relative; }
  .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; background: #f9f9f9; transition: border-color 0.15s; }
  .search-input:focus { border-color: #FF6B35; background: #fff; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #aaa; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; font-size: 18px; display: none; padding: 0 4px; }
  .filters-wrap { background: #fff; border-bottom: 1px solid #eee; padding: 0.75rem 1rem; overflow-x: auto; }
  .filters { display: flex; gap: 8px; min-width: max-content; margin: 0 auto; max-width: 600px; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; color: #555; white-space: nowrap; font-weight: 500; transition: all 0.15s; flex-shrink: 0; }
  .filter-btn.active { background: #FF6B35; border-color: #FF6B35; color: #fff; }
  .toolbar { max-width: 600px; margin: 0 auto; padding: 0.75rem 1rem 0.25rem; display: flex; align-items: center; justify-content: space-between; }
  .result-count { font-size: 13px; color: #888; }
  .container { max-width: 600px; margin: 0 auto; padding: 0.5rem 1rem 2rem; }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 14px; display: flex; gap: 14px; align-items: center; text-decoration: none; color: inherit; transition: border-color 0.15s; }
  .card:hover { border-color: #FF6B35; }
  .card-img { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #f5f5f5; }
  .card-info { flex: 1; min-width: 0; }
  .card-cat { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .card-title mark { background: #FFF3CD; color: inherit; border-radius: 2px; }
  .card-price { font-size: 17px; font-weight: 700; color: #FF6B35; }
  .card-date { font-size: 11px; color: #aaa; margin-top: 3px; }
  .badge-new { display: inline-block; background: #FFF0E8; color: #FF6B35; font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
  .card-arrow { color: #ccc; font-size: 20px; flex-shrink: 0; }
  .empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 15px; }
  .loader { text-align: center; padding: 1.5rem; }
  .loader-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #FF6B35; margin: 0 3px; animation: bounce 0.8s infinite alternate; }
  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { from { transform: translateY(0); opacity: 0.6; } to { transform: translateY(-8px); opacity: 1; } }
  .end-msg { text-align: center; padding: 1.5rem; font-size: 13px; color: #bbb; }
  .footer { text-align: center; padding: 1.5rem; font-size: 12px; color: #bbb; border-top: 1px solid #eee; background: #fff; }
  .no-results { text-align: center; padding: 3rem 1rem; }
  .no-results p { color: #aaa; font-size: 15px; margin-bottom: 0.5rem; }
  .no-results small { color: #ccc; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">🛍️</div>
  <h1>Ofertadex</h1>
  <p class="bio">Melhores ofertas da Amazon todo dia 🔥</p>
  <div class="social">
    <a href="https://instagram.com/ofertadex" target="_blank">📸 Instagram</a>
    <a href="https://facebook.com/ofertadex1" target="_blank">👍 Facebook</a>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" class="search-input" id="search" placeholder="Buscar produto..." oninput="onSearch(this.value)" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
</div>

<div class="filters-wrap">
  <div class="filters" id="filters"></div>
</div>

<div class="toolbar">
  <span class="result-count" id="resultCount"></span>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="loader" id="loader" style="display:none">
    <span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span>
  </div>
  <div class="end-msg" id="endMsg" style="display:none">Você chegou ao fim — todos os produtos foram carregados ✓</div>
  <div class="no-results" id="noResults" style="display:none">
    <p>Nenhum produto encontrado</p>
    <small>Tente outro termo ou categoria</small>
  </div>
</div>

<div class="footer">ofertadex.github.io — Atualizado automaticamente</div>

<script>
const PAGE_SIZE = 50;
let todos = [];
let filtrados = [];
let paginaAtual = 0;
let carregando = false;
let catAtiva = 'Todos';
let buscaAtiva = '';

async function init() {
  try {
    const r = await fetch('produtos.json?t=' + Date.now());
    todos = await r.json();
    todos.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
    renderFiltros();
    aplicarFiltros();
  } catch(e) {
    document.getElementById('noResults').style.display = 'block';
  }
}

function renderFiltros() {
  const cats = ['Todos', ...new Set(todos.map(p => p.categoria).filter(Boolean))];
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === catAtiva ? 'active' : ''}" onclick="selecionarCat('${c}')">${c}</button>`
  ).join('');
}

function selecionarCat(cat) {
  catAtiva = cat;
  renderFiltros();
  aplicarFiltros();
}

function onSearch(val) {
  buscaAtiva = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = buscaAtiva ? 'block' : 'none';
  aplicarFiltros();
}

function clearSearch() {
  document.getElementById('search').value = '';
  onSearch('');
}

function aplicarFiltros() {
  filtrados = todos.filter(p => {
    const matchCat = catAtiva === 'Todos' || p.categoria === catAtiva;
    const matchBusca = !buscaAtiva || p.titulo.toLowerCase().includes(buscaAtiva);
    return matchCat && matchBusca;
  });
  paginaAtual = 0;
  document.getElementById('grid').innerHTML = '';
  document.getElementById('endMsg').style.display = 'none';
  document.getElementById('noResults').style.display = filtrados.length === 0 ? 'block' : 'none';
  atualizarCount();
  carregarPagina();
}

function atualizarCount() {
  const total = filtrados.length;
  if (total === 0) { document.getElementById('resultCount').textContent = ''; return; }
  document.getElementById('resultCount').textContent = total + (total === 1 ? ' produto' : ' produtos');
}

function highlight(text, termo) {
  if (!termo) return text;
  const re = new RegExp('(' + termo.replace(/[.*+?^${}()|[\]]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function diasAtras(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff === 0) return 'Hoje';
  if (diff === 1) return 'Ontem';
  if (diff < 7) return diff + ' dias atrás';
  if (diff < 30) return Math.floor(diff / 7) + ' sem. atrás';
  return Math.floor(diff / 30) + ' mes. atrás';
}

function carregarPagina() {
  if (carregando) return;
  const inicio = paginaAtual * PAGE_SIZE;
  const fim = inicio + PAGE_SIZE;
  const slice = filtrados.slice(inicio, fim);
  if (slice.length === 0) return;

  carregando = true;
  document.getElementById('loader').style.display = 'block';

  setTimeout(() => {
    const grid = document.getElementById('grid');
    slice.forEach((p, i) => {
      const idx = inicio + i;
      const isNovo = diasAtras(p.published_at) === 'Hoje' && idx === 0;
      const titulo = highlight(p.titulo, buscaAtiva);
      const card = document.createElement('a');
      card.className = 'card';
      card.href = p.affiliate_url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML = `
        <img class="card-img" src="${p.imagem_url}" alt="${p.titulo}" loading="lazy" onerror="this.src='https://placehold.co/72x72/f5f5f5/aaa?text=IMG'" />
        <div class="card-info">
          <p class="card-cat">${p.categoria || 'Oferta'}</p>
          <p class="card-title">${titulo}${isNovo ? '<span class="badge-new">NOVO</span>' : ''}</p>
          <p class="card-price">R$ ${(p.preco_cent / 100).toFixed(2).replace('.', ',')}</p>
          <p class="card-date">${diasAtras(p.published_at)}</p>
        </div>
        <span class="card-arrow">›</span>`;
      grid.appendChild(card);
    });

    paginaAtual++;
    carregando = false;
    document.getElementById('loader').style.display = 'none';
    atualizarCount();

    if (paginaAtual * PAGE_SIZE >= filtrados.length) {
      if (filtrados.length > PAGE_SIZE) {
        document.getElementById('endMsg').style.display = 'block';
      }
    }
  }, 300);
}

function onScroll() {
  if (carregando) return;
  if (paginaAtual * PAGE_SIZE >= filtrados.length) return;
  const scrollBottom = window.innerHeight + window.scrollY;
  const pageHeight = document.body.offsetHeight;
  if (scrollBottom >= pageHeight - 300) {
    carregarPagina();
  }
}

window.addEventListener('scroll', onScroll, { passive: true });
init();
</script>
</body>
</html>
